##### ===== Core Behavior ===== #####

# Large scrollback for logs, RTL sims, compiler output, etc.
set -g history-limit 50000

# VSCode-like behavior:
# - click panes
# - resize panes
# - scroll with mouse
set -g mouse on

# Let tmux cooperate with system clipboard when supported.
set -g set-clipboard on

# Better key handling over SSH.
set -g xterm-keys on

# Snappier escape-key behavior.
set -g escape-time 10

# Helps vim/nvim detect focus changes.
set -g focus-events on

# Vim-style keys in tmux copy mode.
setw -g mode-keys vi

# Renumber windows after closing one.
set -g renumber-windows on


##### ===== Prefix Key ===== #####

# Replace default Ctrl-b with Ctrl-a.
unbind C-b
set -g prefix C-a

# Send Ctrl-a into nested tmux/programs.
bind C-a send-prefix


##### ===== Window / Pane Indexing ===== #####

# Start windows/panes at 1.
set -g base-index 1
setw -g pane-base-index 1


##### ===== Reload Config ===== #####

# Ctrl-a r reloads config.
unbind r
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"


##### ===== Pane Splitting ===== #####

# Remove default split keys.
unbind %
unbind '"'

# Vertical split: left/right.
bind | split-window -h -c "#{pane_current_path}"
bind g split-window -h -c "#{pane_current_path}"

# Horizontal split: top/bottom.
bind - split-window -v -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"


##### ===== Pane Navigation ===== #####

# Alt + arrows.
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Alt + hjkl.
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D


##### ===== Pane Resizing ===== #####

# Ctrl-a Shift-h/j/k/l resizes panes.
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r K resize-pane -U 3
bind -r J resize-pane -D 3


##### ===== Window Management ===== #####

# New window in same directory.
bind t new-window -c "#{pane_current_path}"
bind C-t new-window -c "#{pane_current_path}"

# Kill current pane/window/session helpers.
bind w kill-pane
bind C-w kill-pane
bind q kill-session
bind C-q kill-session

# New tmux session.
bind n new-session
bind C-n new-session

# Window switching.
bind PageDown next-window
bind PageUp previous-window


##### ===== VSCode-like Mouse Copy/Paste ===== #####

# With mouse on, tmux captures normal drag.
# On macOS terminals, native copy usually works with:
#   Option/Shift + drag -> Cmd+C
#
# For tmux-native mouse selection:
#   drag with mouse -> selection starts
#   release mouse   -> text is copied to clipboard automatically

# Start copy-mode selection when dragging with mouse.
bind -T root MouseDrag1Pane copy-mode -M

# Copy selected text on mouse release.
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"'

# Paste is still normal terminal paste:
#   macOS: Cmd+V
#   terminal/Linux: Ctrl+Shift+V


##### ===== Manual Copy Mode ===== #####

# Precise copy mode for logs:
#   Ctrl-a [
#   /keyword
#   v
#   move with h/j/k/l
#   y
bind [ copy-mode

# Begin selection with v.
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Copy with y.
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"'

# Copy with Enter.
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"'


##### ===== Copy Mode Search ===== #####

bind-key -T copy-mode-vi / send-keys -X search-forward
bind-key -T copy-mode-vi ? send-keys -X search-backward
bind-key -T copy-mode-vi n send-keys -X search-again
bind-key -T copy-mode-vi N send-keys -X search-reverse


##### ===== Activity / Titles ===== #####

# Show activity notifications from background windows.
setw -g monitor-activity on
set -g visual-activity on

# Set terminal tab/window title.
set -g set-titles on


##### ===== Status Bar ===== #####

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style bg=black,fg=white

# Left: session, host, user.
set -g status-left-length 60
set -g status-left "#[fg=green,bold]#S #[fg=cyan]#H #[fg=yellow]#(whoami)"

# Right: date, time, current path.
set -g status-right-length 100
set -g status-right "#[fg=magenta]%Y-%m-%d #[fg=cyan]%H:%M #[fg=green]#{pane_current_path}"

# Window styling.
setw -g window-status-format " #[fg=white]#I:#W "
setw -g window-status-current-format " #[fg=black,bg=green,bold]#I:#W "

# Pane borders.
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=green


##### ===== Quality of Life ===== #####

# Optional custom dev layout.
bind D source-file ~/.tmux/dev

# Redraw client.
bind R refresh-client

# Detach.
bind C-d detach-client

# Paste tmux buffer.
bind C-p paste-buffer


##### ===== Plugins ===== #####

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'


##### ===== Plugin Configuration ===== #####

set -g @resurrect-strategy-vim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save-bash-history 'on'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'


##### ===== TPM: Must Stay Last ===== #####

run '~/.tmux/plugins/tpm/tpm'
