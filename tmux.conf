##### ===== Core Behavior ===== #####

# Large scrollback (important for logs, RTL sims, etc.)
set -g history-limit 50000

# VSCode-like mouse:
# - click to focus panes
# - resize panes
# - scroll
# - drag to select
set -g mouse on

# Use tmux clipboard integration (works over SSH via OSC52)
set -g set-clipboard on

# Tell tmux terminal supports clipboard (important for remote → Mac copy)
set -as terminal-features ',xterm-256color:clipboard'
set -as terminal-features ',screen-256color:clipboard'
set -as terminal-features ',tmux-256color:clipboard'

# Better key handling over SSH
set -g xterm-keys on

# Faster key response
set -g escape-time 10

# Allow vim/nvim to detect focus
set -g focus-events on

# Vim-style navigation in copy mode
setw -g mode-keys vi

# Renumber windows automatically
set -g renumber-windows on


##### ===== Prefix ===== #####

# Replace Ctrl-b with Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix


##### ===== Indexing ===== #####

set -g base-index 1
setw -g pane-base-index 1


##### ===== Reload ===== #####

# Reload config with Ctrl-a r
unbind r
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"


##### ===== Pane Splitting ===== #####

unbind %
unbind '"'

# Vertical split
bind g split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Horizontal split
bind h split-window -v -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"


##### ===== Pane Navigation ===== #####

# Alt + arrows
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Alt + vim keys
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D


##### ===== Pane Resizing ===== #####

bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r K resize-pane -U 3
bind -r J resize-pane -D 3


##### ===== Window Management ===== #####

bind t new-window -c "#{pane_current_path}"
bind C-t new-window -c "#{pane_current_path}"

bind w kill-pane
bind C-w kill-pane

bind q kill-session
bind C-q kill-session

bind n new-session
bind C-n new-session

bind PageDown next-window
bind PageUp previous-window


##### ===== VSCode-like Mouse Copy (FIXED) ===== #####

# Drag mouse → enters copy mode
bind -T root MouseDrag1Pane copy-mode -M

# Release mouse → copy selection to clipboard and exit
# Uses tmux internal clipboard (works over SSH)
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Paste:
# Mac → Cmd+V
# Linux terminal → Ctrl+Shift+V


##### ===== Optional Precise Copy Mode ===== #####

# For debugging logs:
# Ctrl-a [ → /search → v → move → y
bind [ copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel


##### ===== Copy Mode Search ===== #####

bind-key -T copy-mode-vi / send-keys -X search-forward
bind-key -T copy-mode-vi ? send-keys -X search-backward
bind-key -T copy-mode-vi n send-keys -X search-again
bind-key -T copy-mode-vi N send-keys -X search-reverse


##### ===== Activity / Titles ===== #####

setw -g monitor-activity on
set -g visual-activity on
set -g set-titles on


##### ===== Status Bar ===== #####

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style bg=black,fg=white

set -g status-left-length 60
set -g status-left "#[fg=green,bold]#S #[fg=cyan]#H #[fg=yellow]#(whoami)"

set -g status-right-length 100
set -g status-right "#[fg=magenta]%Y-%m-%d #[fg=cyan]%H:%M #[fg=green]#{pane_current_path}"

setw -g window-status-format " #[fg=white]#I:#W "
setw -g window-status-current-format " #[fg=black,bg=green,bold]#I:#W "

set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=green


##### ===== Quality of Life ===== #####

bind D source-file ~/.tmux/dev
bind R refresh-client
bind C-d detach-client
bind C-p paste-buffer


##### ===== Plugins ===== #####

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'


##### ===== Plugin Config ===== #####

set -g @resurrect-strategy-vim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save-bash-history 'on'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'


##### ===== TPM SAFE LOAD ===== #####

# Prevents "returned 127" if TPM isn't installed
if-shell '[ -x ~/.tmux/plugins/tpm/tpm ]' \
  'run ~/.tmux/plugins/tpm/tpm' \
  'display-message "TPM not installed → run: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm"'
  