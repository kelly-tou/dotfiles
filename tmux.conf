##### ===== Core Behavior ===== #####

# Increase scrollback buffer (useful for logs, RTL sims, long outputs)
set -g history-limit 50000

# Enable mouse (click to switch panes, resize, scroll)
set -g mouse on

# Better key handling for terminals (important over SSH)
set -g xterm-keys on

# Reduce delay for key combos (makes tmux feel snappier)
set -g escape-time 10

# Allow tmux to detect focus changes (useful for editors like vim)
set -g focus-events on

# Use vim-style keybindings in copy mode (hjkl, /, etc.)
setw -g mode-keys vi

# Automatically renumber windows after closing one
set -g renumber-windows on


##### ===== Prefix Key ===== #####

# Unbind default Ctrl-b prefix
unbind C-b

# Set prefix to Ctrl-a (more ergonomic)
set -g prefix C-a

# Allow sending Ctrl-a to programs inside tmux (e.g., nested tmux/ssh)
bind C-a send-prefix


##### ===== Window / Pane Indexing ===== #####

# Start window numbering at 1 instead of 0
set -g base-index 1

# Start pane numbering at 1
setw -g pane-base-index 1


##### ===== Reload Config ===== #####

# Unbind default r
unbind r

# Reload tmux config quickly with Ctrl-a + r
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"


##### ===== Pane Splitting ===== #####

# Remove default split bindings
unbind %
unbind '"'

# Split vertically (left/right), keep current working directory
bind | split-window -h -c "#{pane_current_path}"

# Split horizontally (top/bottom)
bind - split-window -v -c "#{pane_current_path}"

# Fast splits (muscle memory shortcuts)
bind g split-window -h -c "#{pane_current_path}"   # vertical split
bind h split-window -v -c "#{pane_current_path}"   # horizontal split


##### ===== Pane Navigation ===== #####

# Navigate panes using Alt + arrow keys
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Navigate panes using Alt + vim keys
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D


##### ===== Pane Resizing ===== #####

# Resize panes quickly using Ctrl-a + Shift + hjkl
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r K resize-pane -U 3
bind -r J resize-pane -D 3


##### ===== Window Management ===== #####

# Create new window in same directory
bind t new-window -c "#{pane_current_path}"
bind C-t new-window -c "#{pane_current_path}"

# Kill current pane
bind w kill-pane
bind C-w kill-pane

# Kill entire session
bind q kill-session
bind C-q kill-session

# Create new tmux session
bind n new-session
bind C-n new-session

# Navigate windows
bind PageDown next-window
bind PageUp previous-window


##### ===== Copy Mode (Vi-style) ===== #####

# Enter copy mode with Ctrl-a + [
bind [ copy-mode

# Begin selection with 'v' (like vim)
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Cross-platform clipboard:
# If on Mac → use pbcopy
# Else (Linux) → use xclip
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"'

if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"'


##### ===== Copy Mode Search ===== #####

# Search forward with /
bind-key -T copy-mode-vi / send-keys -X search-forward

# Search backward with ?
bind-key -T copy-mode-vi ? send-keys -X search-backward

# Repeat search forward
bind-key -T copy-mode-vi n send-keys -X search-again

# Repeat search backward
bind-key -T copy-mode-vi N send-keys -X search-reverse


##### ===== Activity / Titles ===== #####

# Highlight windows with activity
setw -g monitor-activity on
set -g visual-activity on

# Allow tmux to set terminal title (useful for SSH tabs)
set -g set-titles on


##### ===== Status Bar ===== #####

# Enable status bar
set -g status on

# Refresh every 5 seconds
set -g status-interval 5

# Place at bottom
set -g status-position bottom

# Colors
set -g status-style bg=black,fg=white

# Left side: session name + hostname + user
set -g status-left-length 60
set -g status-left "#[fg=green,bold]#S #[fg=cyan]#H #[fg=yellow]#(whoami)"

# Right side: date + time + current directory
set -g status-right-length 100
set -g status-right "#[fg=magenta]%Y-%m-%d #[fg=cyan]%H:%M #[fg=green]#{pane_current_path}"

# Window list styling
setw -g window-status-format " #[fg=white]#I:#W "
setw -g window-status-current-format " #[fg=black,bg=green,bold]#I:#W "

# Pane borders
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=green


##### ===== Quality of Life ===== #####

# Load custom dev layout (optional file)
bind D source-file ~/.tmux/dev

# Force redraw
bind R refresh-client

# Detach from session
bind C-d detach-client

# Paste buffer
bind C-p paste-buffer


##### ===== Plugins ===== #####

# Plugin manager (TPM)
set -g @plugin 'tmux-plugins/tpm'

# Save/restore sessions (great for long-running jobs)
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Auto-save sessions periodically
set -g @plugin 'tmux-plugins/tmux-continuum'

# Better clipboard/yank integration
set -g @plugin 'tmux-plugins/tmux-yank'


##### ===== Plugin Configuration ===== #####

# Keep vim sessions when restoring
set -g @resurrect-strategy-vim 'session'

# Save pane contents (useful for logs)
set -g @resurrect-capture-pane-contents 'on'

# Save shell history
set -g @resurrect-save-bash-history 'on'

# Auto-restore tmux session on start
set -g @continuum-restore 'on'

# Auto-save every 5 minutes
set -g @continuum-save-interval '5'


##### ===== TPM (MUST BE LAST) ===== #####

# Initialize plugin manager
run '~/.tmux/plugins/tpm/tpm'
