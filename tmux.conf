##### ===== Core Behavior ===== #####

set -g history-limit 50000
set -g mouse on
set -g set-clipboard on

# Clipboard support for remote tmux -> local terminal when OSC52 works
set -as terminal-features ',xterm-256color:clipboard'
set -as terminal-features ',screen-256color:clipboard'
set -as terminal-features ',tmux-256color:clipboard'

set -g xterm-keys on
set -g escape-time 10
set -g focus-events on
setw -g mode-keys vi
set -g renumber-windows on


##### ===== Prefix ===== #####

unbind C-b
set -g prefix C-a
bind C-a send-prefix


##### ===== Indexing ===== #####

set -g base-index 1
setw -g pane-base-index 1


##### ===== Reload ===== #####

unbind r
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"


##### ===== Pane Splitting ===== #####

unbind %
unbind '"'

bind g split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

bind h split-window -v -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"


##### ===== Pane Navigation ===== #####

bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D


##### ===== Pane Resizing ===== #####

bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r K resize-pane -U 3
bind -r J resize-pane -D 3


##### ===== Window Management ===== #####

bind t new-window -c "#{pane_current_path}"
bind C-t new-window -c "#{pane_current_path}"

bind w kill-pane
bind C-w kill-pane

bind q kill-session
bind C-q kill-session

bind n new-session
bind C-n new-session

bind PageDown next-window
bind PageUp previous-window


##### ===== Mouse / Copy ===== #####

# Drag mouse to start tmux selection.
bind-key -T root MouseDrag1Pane copy-mode -M

# Release mouse to copy selection and exit copy mode.
# Uses tmux set-clipboard / OSC52 when supported.
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Manual precise copy mode:
# Ctrl-a [ -> v -> move -> y
bind [ copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel


##### ===== Copy Mode Search ===== #####

bind-key -T copy-mode-vi / send-keys -X search-forward
bind-key -T copy-mode-vi ? send-keys -X search-backward
bind-key -T copy-mode-vi n send-keys -X search-again
bind-key -T copy-mode-vi N send-keys -X search-reverse


##### ===== Activity / Titles ===== #####

setw -g monitor-activity on
set -g visual-activity on
set -g set-titles on


##### ===== Status Bar ===== #####

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style bg=black,fg=white

set -g status-left-length 60
set -g status-left "#[fg=green,bold]#S #[fg=cyan]#H #[fg=yellow]#(whoami)"

set -g status-right-length 100
set -g status-right "#[fg=magenta]%Y-%m-%d #[fg=cyan]%H:%M #[fg=green]#{pane_current_path}"

setw -g window-status-format " #[fg=white]#I:#W "
setw -g window-status-current-format " #[fg=black,bg=green,bold]#I:#W "

set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=green


##### ===== Quality of Life ===== #####

bind D source-file ~/.tmux/dev
bind R refresh-client
bind C-d detach-client
bind C-p paste-buffer


##### ===== Plugins ===== #####

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

##### ===== Mouse / Copy ===== #####

# Drag mouse to start tmux selection.
bind-key -T root MouseDrag1Pane copy-mode -M

# LOCAL MAC:
# If pbcopy exists, mouse release copies directly to Mac clipboard.
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel'

if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-and-cancel'

# Manual precise copy mode:
# Ctrl-a [ -> v -> move -> y
bind [ copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection

# y copies using pbcopy on Mac, otherwise tmux clipboard/OSC52.
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel'

if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel'


##### ===== Plugin Config ===== #####

set -g @resurrect-strategy-vim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save-bash-history 'on'

# Keep OFF on fresh/remote machines to avoid resurrect file-not-found errors.
set -g @continuum-restore 'off'
set -g @continuum-save-interval '5'


##### ===== TPM SAFE LOAD ===== #####

if-shell '[ -x ~/.tmux/plugins/tpm/tpm ]' \
  'run ~/.tmux/plugins/tpm/tpm' \
  'display-message "TPM not installed → run: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm"'
